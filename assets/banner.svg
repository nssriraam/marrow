<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Smooth horizontal gradient: Teal -> Near Black/Navy -> Red -->
    <linearGradient id="bgGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0D9488" />
      <stop offset="50%" stop-color="#070914" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
  </defs>

  <!-- Solid Smooth Gradient Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif">
    
    <!-- Triangle Icon with subtle circular outline -->
    <g transform="translate(600, 95)">
      <!-- Subtle circular outline -->
      <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(232,232,236,0.15)" stroke-width="1.5" />
      <!-- Triangle -->
      <path d="M 0 -12 L 14 12 L -14 12 Z" fill="#E8E8EC" />
    </g>

    <!-- Bold Large Geometric Wordmark -->
    <text x="600" y="230" font-weight="900" font-size="130" fill="#E8E8EC" letter-spacing="-3">MARROW</text>

    <!-- Tagline inside thin white outlined pill shape -->
    <g transform="translate(600, 310)">
      <rect x="-210" y="-26" width="420" height="52" rx="26" fill="none" stroke="#E8E8EC" stroke-width="1.5" />
      <text x="0" y="5" font-weight="700" font-size="15" fill="#E8E8EC" letter-spacing="4">WHERE FINOPS MEETS SECOPS</text>
    </g>

  </g>
</svg>
